<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permit2Drive Picker Test</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        padding: 20px;
      }
      button {
        font-size: 18px;
        padding: 12px 18px;
      }
      pre {
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
      }
    </style>

    <script>
      const DEVELOPER_KEY = "AIzaSyA6Cg78QUtoHPYY86mRWAoNE04FER8a73I"
      const APP_ID = "76459013069"
      const CLIENT_ID = "76459013069-d2sbf93vt4eemqff2cgva073i37f3k8a.apps.googleusercontent.com"
      const SCOPE = "https://www.googleapis.com/auth/drive.file"

      let tokenClient
      let accessToken = null

      function log(value) {
        document.getElementById("result").textContent =
          typeof value === "string" ? value : JSON.stringify(value, null, 2)
      }

      function onGapiLoaded() {
        gapi.load("picker", () => {
          log("Picker API loaded. Click the button to choose a file.")
        })
      }

      const pageParams = new URLSearchParams(window.location.search)
      const LOGIN_HINT = pageParams.get("loginHint") || ""

      function onGisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPE,
          hint: LOGIN_HINT || undefined,
          callback: (response) => {
            if (response.error) {
              log(response)
              return
            }

            accessToken = response.access_token
            createPicker()
          },
        })
      }

      function chooseFile() {
        if (!tokenClient) {
          log("Google Identity Services not loaded yet.")
          return
        }

        tokenClient.requestAccessToken({ prompt: "" })
      }

      function createPicker() {
        const docsView = new google.picker.DocsView(google.picker.ViewId.DOCS)
          .setMimeTypes("application/json")
          .setQuery("Permit2Drive")
          .setOwnedByMe(false)
          .setIncludeFolders(false)
          .setMode(google.picker.DocsViewMode.LIST)

        const picker = new google.picker.PickerBuilder()
          .addView(docsView)
          .setOAuthToken(accessToken)
          .setDeveloperKey(DEVELOPER_KEY)
          .setAppId(APP_ID)
          .setSelectableMimeTypes("application/json")
          .enableFeature(google.picker.Feature.NAV_HIDDEN)
          .setCallback((data) => {
            if (data.action === google.picker.Action.CANCEL) {
              log("Picker cancelled.")
              return
            }

            if (data.action === google.picker.Action.PICKED) {
              const doc = data.docs && data.docs[0]

              const params = new URLSearchParams(window.location.search)
              const returnUrl = params.get("returnUrl") || "permit2drive://google-picker"

              const separator = returnUrl.includes("?") ? "&" : "?"
              const target =
                returnUrl +
                separator +
                "fileId=" +
                encodeURIComponent(doc.id || "") +
                "&name=" +
                encodeURIComponent(doc.name || doc.title || "") +
                "&mimeType=" +
                encodeURIComponent(doc.mimeType || "")

              window.location.href = target
            }
          })
          .build()

        picker.setVisible(true)
      }
    </script>

    <script async defer src="https://apis.google.com/js/api.js" onload="onGapiLoaded()"></script>
    <script
      async
      defer
      src="https://accounts.google.com/gsi/client"
      onload="onGisLoaded()"
    ></script>
  </head>

  <body>
    <h1>Permit2Drive Picker Test</h1>
    <p>
      This page tests whether Google Picker can show shared Permit2Drive JSON files with drive.file.
    </p>
    <button onclick="chooseFile()">Choose shared Permit2Drive file</button>
    <h2>Result</h2>
    <pre id="result">Loading...</pre>
  </body>
</html>
